name: green_track
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  intl: any

  provider: 6.1.5+1

  go_router: 17.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: PlusJakartaSans
      fonts:
          - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans.ttf
          - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Italic.ttf
            style: italic

  generate: true